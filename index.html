<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Experiencia AR - Doraemon</title>

  <!-- Librerías -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* PANTALLA DE INICIO */
    #inicio {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #000428, #004e92);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      text-align: center;
    }

    #inicio h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    #inicio p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    #inicio button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #00c3ff;
      color: white;
      cursor: pointer;
    }

    #inicio button:hover {
      background: #0099cc;
    }

    /* BOTÓN HIRO */
    .hiro-btn {
      margin-top: 15px;
    }

    /* INSTRUCCIONES ARRIBA */
    #info {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      z-index: 5;
      display: none;
    }
  </style>
</head>

<body>

  <!-- PANTALLA DE INICIO -->
  <div id="inicio">
    <h1>✨ Realidad Aumentada</h1>
    <p>Explora a Doraemon en 3D usando tu cámara</p>

    <button onclick="entrarAR()">🚀 Iniciar experiencia</button>

    <div class="hiro-btn">
      <a href="hiro.png" target="_blank">
        <button>📥 Ver marcador Hiro</button>
      </a>
    </div>
  </div>

  <!-- TEXTO SUPERIOR -->
  <div id="info">
    📱 Apunta la cámara al marcador Hiro
  </div>

  <!-- ESCENA AR -->
  <a-scene embedded arjs style="display: none;" id="escena">

    <a-marker preset="hiro">

      <a-entity 
        gltf-model="doraemon_fan_art.glb"
        scale="0.3 0.3 0.3"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-entity>

      <a-text value="Doraemon AR" position="0 1 0" color="yellow" align="center"></a-text>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <!-- SCRIPT -->
  <script>
    function entrarAR() {
      document.getElementById("inicio").style.display = "none";
      document.getElementById("escena").style.display = "block";
      document.getElementById("info").style.display = "block";
    }
  </script>

</body>
</html>

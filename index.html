<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Doraemon AR Fix Final</title>

<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: black;
  overflow: hidden;
  height: 100vh;
}

/* ===== PANEL LOGIN ===== */
#panel {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(160deg, #0f172a, #020617);
  z-index: 10;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  border-radius: 24px;
  padding: 36px;
  width: 320px;
  text-align: center;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
}

.btn {
  background: linear-gradient(135deg, #00c3ff, #0055ff);
  color: white;
}

.btn2 {
  background: rgba(255,255,255,0.15);
  color: white;
}

/* ===== AR ===== */
#ar-container {
  position: fixed;
  inset: 0;
  display: none;
}

/* INFO */
#info {
  position: absolute;
  top: 15px;
  width: 100%;
  text-align: center;
  color: white;
  z-index: 5;
  display: none;
  font-size: 14px;
  text-shadow: 0 2px 10px black;
}

/* BOTÓN VOLVER */
#back {
  position: absolute;
  top: 15px;
  right: 15px;
  z-index: 6;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
}

a-scene {
  width: 100vw;
  height: 100vh;
}
</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
  <div class="card">
    <h1>✨ Doraemon AR</h1>
    <p>Inicia la experiencia con marcador Hiro</p>

    <button class="btn" onclick="startAR()">🚀 Iniciar experiencia</button>

    <a href="hiro.png" target="_blank">
      <button class="btn2">📥 Ver marcador Hiro</button>
    </a>
  </div>
</div>

<!-- AR -->
<div id="ar-container">

<button id="back" onclick="goBack()">← Volver</button>
<div id="info">📱 Apunta el marcador Hiro</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="antialias: true; alpha: true">

  <a-assets>
    <a-asset-item id="doraemon" src="doraemon_fan_art.glb"></a-asset-item>
  </a-assets>

  <a-marker preset="hiro">

    <a-entity
      gltf-model="#doraemon"
      scale="0.3 0.3 0.3"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
    </a-entity>

    <a-text value="Doraemon AR"
            position="0 1 0"
            color="#FFD700"
            align="center">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

</div>

<script>
function startAR() {
  document.getElementById("panel").style.display = "none";
  document.getElementById("ar-container").style.display = "block";
  document.getElementById("info").style.display = "block";

  // 🔥 fuerza recalcular cámara AR
  setTimeout(() => {
    window.dispatchEvent(new Event('resize'));
  }, 300);
}

function goBack() {
  document.getElementById("panel").style.display = "flex";
  document.getElementById("ar-container").style.display = "none";
  document.getElementById("info").style.display = "none";
}
</script>

</body>
</html>
